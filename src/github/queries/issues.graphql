query IssuesPage($owner: String!, $repo: String!, $cursor: String) {
  repository(owner: $owner, name: $repo) {
    issues(first: 50, after: $cursor, orderBy: {field: UPDATED_AT, direction: DESC}) {
      pageInfo { hasNextPage endCursor }
      nodes {
        id
        number
        title
        body
        state
        stateReason
        createdAt
        updatedAt
        closedAt
        author { __typename login }
        milestone { title }
        labels(first: 50) { nodes { name } }
        assignees(first: 20) { nodes { login } }
        comments(first: 50) {
          totalCount
          pageInfo { hasNextPage endCursor }
          nodes { id createdAt body author { __typename login } }
        }
        timelineItems(first: 50, itemTypes: [
          CROSS_REFERENCED_EVENT, CONNECTED_EVENT, DISCONNECTED_EVENT,
          MARKED_AS_DUPLICATE_EVENT, UNMARKED_AS_DUPLICATE_EVENT
        ]) {
          pageInfo { hasNextPage endCursor }
          nodes {
            __typename
            ... on CrossReferencedEvent { createdAt source { __typename ... on Issue { number } ... on PullRequest { number } } }
            ... on ConnectedEvent { createdAt subject { __typename ... on Issue { number } ... on PullRequest { number } } }
            ... on DisconnectedEvent { createdAt subject { __typename ... on Issue { number } ... on PullRequest { number } } }
            ... on MarkedAsDuplicateEvent { createdAt canonical { __typename ... on Issue { number } ... on PullRequest { number } } }
            ... on UnmarkedAsDuplicateEvent { createdAt canonical { __typename ... on Issue { number } ... on PullRequest { number } } }
          }
        }
      }
    }
  }
}
