query CommentsPage($id: ID!, $cursor: String) {
  node(id: $id) {
    __typename
    ... on Issue {
      comments(first: 100, after: $cursor) {
        pageInfo { hasNextPage endCursor }
        nodes { id createdAt body author { __typename login } }
      }
    }
    ... on PullRequest {
      comments(first: 100, after: $cursor) {
        pageInfo { hasNextPage endCursor }
        nodes { id createdAt body author { __typename login } }
      }
    }
  }
}
